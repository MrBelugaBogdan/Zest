<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zest Editor — Visual Coding</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">ZEST ⚡</div>
        <button class="run-btn" onclick="runZest()">Запустити код</button>
    </header>

    <main>
        <div id="blocklyDiv"></div>

        <div id="outputConsole">
            <h3>Результат:</h3>
            <div id="log"></div>
        </div>
    </main>

    <xml id="toolbox" style="display: none">
        <category name="Логіка" colour="#5b80a5">
            <block type="controls_if"></block>
            <block type="logic_compare"></block>
        </category>
        <category name="Цикли" colour="#5ba55b">
            <block type="controls_repeat_ext"></block>
        </category>
        <category name="Математика" colour="#5b67a5">
            <block type="math_number"></block>
            <block type="math_arithmetic"></block>
        </category>
        <category name="Текст" colour="#a55b80">
            <block type="text"></block>
            <block type="text_print"></block>
        </category>
    </xml>

    <script src="script.js"></script>
</body>
</html>
